# Compliance Framework Configuration
# Define mappings between RHACS policies and compliance frameworks

frameworks:
  nist-800-190:
    name: "NIST 800-190"
    full_name: "NIST Special Publication 800-190 - Application Container Security Guide"
    description: "Guidelines for container security"
    url: "https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-190.pdf"
    policy_filter:
      type: "name_prefix"
      value: "NIST-800-190"
    categories:
      - "4.1 - Image Risks"
      - "4.2 - Registry Risks"
      - "4.3 - Orchestrator Risks"
      - "4.4 - Container Risks"
      - "4.5 - Host OS Risks"
      - "Runtime"

  nist-800-53:
    name: "NIST 800-53"
    full_name: "NIST Special Publication 800-53 - Security and Privacy Controls"
    description: "Security and privacy controls for information systems"
    url: "https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-53r5.pdf"
    policy_filter:
      type: "category"
      value: "NIST 800-53"
    categories:
      - "Access Control (AC)"
      - "Audit and Accountability (AU)"
      - "Configuration Management (CM)"
      - "Identification and Authentication (IA)"
      - "System and Communications Protection (SC)"
      - "System and Information Integrity (SI)"

  pci-dss:
    name: "PCI-DSS"
    full_name: "Payment Card Industry Data Security Standard"
    description: "Information security standard for organizations handling credit cards"
    url: "https://www.pcisecuritystandards.org/"
    policy_filter:
      type: "category"
      value: "PCI"
    categories:
      - "Requirement 1 - Network Security"
      - "Requirement 2 - System Configuration"
      - "Requirement 3 - Data Protection"
      - "Requirement 4 - Data Transmission"
      - "Requirement 5 - Malware Protection"
      - "Requirement 6 - Secure Systems"
      - "Requirement 7 - Access Control"
      - "Requirement 8 - Authentication"
      - "Requirement 9 - Physical Access"
      - "Requirement 10 - Monitoring"
      - "Requirement 11 - Security Testing"
      - "Requirement 12 - Security Policy"

  hipaa:
    name: "HIPAA"
    full_name: "Health Insurance Portability and Accountability Act"
    description: "Standards for protecting sensitive patient health information"
    url: "https://www.hhs.gov/hipaa/"
    policy_filter:
      type: "category"
      value: "HIPAA"
    categories:
      - "Administrative Safeguards"
      - "Physical Safeguards"
      - "Technical Safeguards"
      - "Organizational Requirements"
      - "Policies and Procedures"

  cis-kubernetes:
    name: "CIS Kubernetes Benchmark"
    full_name: "CIS Kubernetes Benchmark"
    description: "Security configuration guidelines for Kubernetes"
    url: "https://www.cisecurity.org/benchmark/kubernetes"
    policy_filter:
      type: "category"
      value: "CIS"
    categories:
      - "Control Plane Configuration"
      - "Worker Node Configuration"
      - "Policies"
      - "Network Policies"
      - "Pod Security Standards"

  gdpr:
    name: "GDPR"
    full_name: "General Data Protection Regulation"
    description: "EU regulation on data protection and privacy"
    url: "https://gdpr.eu/"
    policy_filter:
      type: "category"
      value: "GDPR"
    categories:
      - "Data Protection by Design"
      - "Data Protection by Default"
      - "Security of Processing"
      - "Data Breach Notification"
      - "Privacy Rights"

  soc2:
    name: "SOC 2"
    full_name: "Service Organization Control 2"
    description: "Trust service criteria for service organizations"
    url: "https://www.aicpa.org/soc2"
    policy_filter:
      type: "category"
      value: "SOC 2"
    categories:
      - "Security"
      - "Availability"
      - "Processing Integrity"
      - "Confidentiality"
      - "Privacy"

  iso-27001:
    name: "ISO 27001"
    full_name: "ISO/IEC 27001 - Information Security Management"
    description: "International standard for information security management systems"
    url: "https://www.iso.org/isoiec-27001-information-security.html"
    policy_filter:
      type: "category"
      value: "ISO 27001"
    categories:
      - "Information Security Policies"
      - "Organization of Information Security"
      - "Human Resource Security"
      - "Asset Management"
      - "Access Control"
      - "Cryptography"
      - "Physical and Environmental Security"
      - "Operations Security"
      - "Communications Security"
      - "System Acquisition"
      - "Supplier Relationships"
      - "Incident Management"
      - "Business Continuity"
      - "Compliance"

  fedramp:
    name: "FedRAMP"
    full_name: "Federal Risk and Authorization Management Program"
    description: "US government program for cloud security assessment"
    url: "https://www.fedramp.gov/"
    policy_filter:
      type: "category"
      value: "FedRAMP"
    categories:
      - "Access Control"
      - "Awareness and Training"
      - "Audit and Accountability"
      - "Configuration Management"
      - "Identification and Authentication"
      - "Incident Response"
      - "Maintenance"
      - "Media Protection"
      - "Physical Protection"
      - "Risk Assessment"
      - "System and Communications Protection"
      - "System and Information Integrity"

# Custom framework template
custom-template:
  name: "Custom Framework"
  full_name: "Custom Compliance Framework"
  description: "User-defined compliance framework"
  url: ""
  policy_filter:
    type: "tag"  # or "category", "name_prefix", "name_contains"
    value: "CUSTOM"
  categories:
    - "Category 1"
    - "Category 2"
    - "Category 3"
